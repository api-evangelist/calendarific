aid: calendarific
name: Calendarific
description: >-
  Worldwide public holidays REST API covering 230+ countries. Calendarific provides national, local, religious, and
  observance holiday data with localization across many ISO-639 languages. Used for ecommerce scheduling, HR systems,
  travel planning, payroll, and global operations.
url: https://calendarific.com/
specificationVersion: '0.20'
created: '2026-05-28'
modified: '2026-05-29'
x-source: public-apis/public-apis
x-category: Calendar
x-tier: 3
x-tier-reason: bulk-registered-from-public-apis
tags:
  - Calendar
  - Public APIs
  - Holidays
  - Worldwide
  - Localization
apis:
  - name: Calendarific Holiday API
    description: >-
      REST API returning worldwide public holidays for any of 230+ countries and any year through 2049. Supports
      filtering by month, day, sub-region (ISO-3166-2), holiday type, and language.
    humanURL: https://calendarific.com/api-documentation
    baseURL: https://calendarific.com/api/v2
    tags:
