name: calendarific-holidays
title: Calendarific Holidays
description: Shared capability for retrieving worldwide holiday data from the Calendarific Holiday API.
version: "0.1.0"
provider: Calendarific
api: Calendarific Holiday API
baseURL: https://calendarific.com/api/v2
authentication:
  type: apiKey
  in: query
  name: api_key
operations:
  - id: listHolidays
    method: GET
    path: /holidays
    summary: List Holidays
    inputs:
      - name: country
        required: true
        description: ISO-3166 country code.
      - name: year
        required: true
        description: Year to retrieve.
      - name: month
        required: false
      - name: day
        required: false
      - name: type
        required: false
      - name: location
        required: false
      - name: language
        required: false
        premium: true
      - name: uuid
        required: false
        premium: true
  - id: listCountries
    method: GET
    path: /countries
    summary: List Countries
  - id: listLanguages
    method: GET
    path: /languages
    summary: List Languages
